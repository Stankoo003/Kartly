<nav style="display: flex; gap: 1rem; align-items: center; padding: 0.75rem 1rem; border-bottom: 1px solid #ddd; font-family: system-ui, sans-serif">
  <a routerLink="/">Home</a>
  @if (auth.isAdmin()) {
    <a routerLink="/admin">Admin</a>
  }
  <span style="margin-left: auto">
    @if (auth.isAuthenticated()) {
      <span>{{ auth.email() }} ({{ auth.role() }})</span>
      <button type="button" (click)="logout()" style="margin-left: 0.5rem">Sign out</button>
    } @else {
      <a routerLink="/login">Sign in</a>
    }
  </span>
</nav>

<router-outlet />
