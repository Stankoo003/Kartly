<main style="max-width: 480px; margin: 2rem auto; font-family: system-ui, sans-serif">
  <h1>Kartly — products</h1>
  <p>API health (<code>/api/health</code>): <strong>{{ health() }}</strong></p>
  <p>Data below comes live from the .NET API via <code>/api/products</code>.</p>

  <form (submit)="$event.preventDefault(); add()" style="display: flex; gap: 0.5rem; margin: 1rem 0">
    <input [(ngModel)]="name" name="name" placeholder="Name" required />
    <input [(ngModel)]="price" name="price" type="number" step="0.01" placeholder="Price" style="width: 90px" />
    <button type="submit">Add</button>
  </form>

  @if (products().length === 0) {
    <p>No products yet — add one above.</p>
  } @else {
    <ul>
      @for (p of products(); track p.id) {
        <li>{{ p.name }} — {{ p.price | number: '1.2-2' }}</li>
      }
    </ul>
  }
</main>
