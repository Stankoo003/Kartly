<nav class="nav elev-sm">
  <a class="nav-brand" routerLink="/">Kartly</a>
  <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
  @if (auth.isAdmin()) {
    <a routerLink="/admin" routerLinkActive="active">Admin</a>
  }
  <span class="spacer"></span>
  @if (auth.isAuthenticated()) {
    <span class="text-muted who">{{ auth.email() }} ({{ auth.role() }})</span>
    <button uiButton variant="ghost" size="sm" type="button" (click)="logout()">Sign out</button>
  } @else {
    <a routerLink="/login">Sign in</a>
  }
</nav>

<router-outlet />
