<aside class="sidebar">
  <a class="brand" routerLink="/admin">
    <span class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18l-2 12H5L3 6Z" />
        <path d="M8 10a4 4 0 0 0 8 0" />
      </svg>
    </span>
    <span class="brand-name">{{ settings.siteName() }}</span>
  </a>

  <nav class="side-nav">
    <a routerLink="products" routerLinkActive="active">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 8 12 3 3 8v8l9 5 9-5V8Z" />
        <path d="m3 8 9 5 9-5M12 13v8" />
      </svg>
      <span>Products</span>
    </a>
    <a routerLink="users" routerLinkActive="active">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="9" cy="8" r="3.2" />
        <path d="M3 20a6 6 0 0 1 12 0M17 11a3 3 0 0 0 0-6M19 20a5 5 0 0 0-2-4" />
      </svg>
      <span>Users</span>
    </a>
    <a routerLink="settings" routerLinkActive="active">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 21v-6M5 11V3M12 21v-9M12 8V3M19 21v-4M19 13V3" />
        <path d="M2 15h6M9 8h6M16 17h6" />
      </svg>
      <span>Settings</span>
    </a>
  </nav>

  <div class="side-foot">
    <a class="store-link" routerLink="/">View store →</a>
    <button class="logout" type="button" (click)="logout()">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M10 17l-5-5 5-5M5 12h11M15 4h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-3" />
      </svg>
      <span>Log Out</span>
    </button>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <h1 class="page-title">{{ pageTitle() }}</h1>
    <div class="topbar-right">
      <!-- Decorative: there is no notifications feature yet, so this is not a control. -->
      <span class="bell" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10.5 21a2 2 0 0 0 3 0" />
        </svg>
      </span>
      <span class="avatar" [title]="auth.email() ?? ''">{{ initial() }}</span>
    </div>
  </header>

  <section class="content">
    <router-outlet />
  </section>
</div>
