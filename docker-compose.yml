services:
  postgres:
    image: postgres:17
    container_name: kartly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kartly
    ports:
      - "5432:5432"
    volumes:
      - kartly-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kartly"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kartly-pgdata: